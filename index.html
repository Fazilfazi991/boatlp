<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boat Seafood Restaurant</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Cinzel:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100vh;overflow-x:hidden;background:#04111e;margin:0;padding:0}
body{font-family:"Cormorant Garamond",Georgia,serif}
.ocean{position:fixed;inset:0;z-index:0;background:linear-gradient(180deg,#1a5c70 0%,#124d62 8%,#0a3248 25%,#061e32 52%,#04111e 78%,#020b16 100%)}
.surface{position:fixed;top:0;left:0;right:0;height:6px;z-index:6;background:rgba(100,180,210,0.25);animation:shimmer 5s ease-in-out infinite}
@keyframes shimmer{0%,100%{opacity:0.5}50%{opacity:0.9}}
.caustics{position:fixed;top:0;left:0;right:0;height:55vh;z-index:1;overflow:hidden;pointer-events:none}
.ray{position:absolute;top:0;transform-origin:top center;filter:blur(2px);animation:sway linear infinite;background:linear-gradient(180deg,rgba(140,210,230,0.18) 0%,rgba(100,180,210,0.06) 50%,transparent 100%)}
@keyframes sway{0%{transform:rotate(var(--r)) scaleX(1);opacity:var(--o)}25%{transform:rotate(calc(var(--r) + var(--s))) scaleX(1.7);opacity:calc(var(--o)*0.5)}50%{transform:rotate(var(--r)) scaleX(0.7);opacity:var(--o)}75%{transform:rotate(calc(var(--r) - var(--s))) scaleX(1.4);opacity:calc(var(--o)*0.6)}100%{transform:rotate(var(--r)) scaleX(1);opacity:var(--o)}}
.bubble{position:fixed;border-radius:50%;border:1px solid rgba(150,210,240,0.28);background:rgba(150,210,240,0.04);pointer-events:none;z-index:2;animation:rise linear infinite}
@keyframes rise{0%{transform:translateY(0) translateX(0);opacity:0}8%{opacity:0.8}88%{opacity:0.35}100%{transform:translateY(-100vh) translateX(var(--dx));opacity:0}}
.dust{position:fixed;border-radius:50%;background:rgba(150,210,240,0.3);pointer-events:none;z-index:2;animation:dfloat linear infinite}
@keyframes dfloat{0%{transform:translate(0,0);opacity:0}20%{opacity:0.75}80%{opacity:0.3}100%{transform:translate(var(--dx),var(--dy));opacity:0}}
.content{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center}
.logo { max-width: 450px; width: 100%; height: auto; margin-bottom: 1.5rem; animation: floatIn 2.8s ease forwards, bob 7s ease-in-out 3s infinite; opacity: 0; position: relative; filter: brightness(0) invert(1) drop-shadow(0px 8px 16px rgba(0,0,0,0.5)); }
@keyframes floatIn{0%{opacity:0;transform:translateY(50px)}100%{opacity:1;transform:translateY(0)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-13px)}}
.divider{width:180px;height:1px;background:linear-gradient(90deg,transparent,rgba(210,170,80,0.7),transparent);margin:0 auto 1.5rem;animation:fadein 2s ease 2s forwards;opacity:0}
.headline{font-weight:400;font-style:italic;font-size:clamp(3.2rem,6.5vw,6rem);color:#fff;letter-spacing:0.04em;line-height:1.2;margin-bottom:1rem;text-shadow:0 2px 6px rgba(0,0,0,0.95),0 6px 40px rgba(0,0,0,0.85);animation:fadein 2.5s ease 2.2s forwards;opacity:0}
.headline em{color:#e8c060;font-style:normal}
.subline{font-family:"Cinzel",serif;font-weight:400;font-size:clamp(0.85rem,1.9vw,1.1rem);letter-spacing:0.3em;color:#d8eef8;text-transform:uppercase;margin-bottom:1.5rem;text-shadow:0 1px 12px rgba(0,0,0,0.9);animation:fadein 2.5s ease 3s forwards;opacity:0}
.vline{width:1px;height:55px;background:linear-gradient(180deg,rgba(210,170,80,0.6),transparent);margin:0 auto;animation:fadein 2s ease 3.8s forwards,vpulse 4.5s ease-in-out 5.5s infinite;opacity:0}
@keyframes vpulse{0%,100%{height:55px;opacity:0.55}50%{height:76px;opacity:1}}
.location{font-family:"Cinzel",serif;font-weight:400;font-size:clamp(0.78rem,1.5vw,0.98rem);letter-spacing:0.48em;color:#e8c87a;text-transform:uppercase;margin-top:1rem;text-shadow:0 1px 10px rgba(0,0,0,0.95);animation:fadein 2s ease 4.5s forwards;opacity:0}
@keyframes fadein{to{opacity:1}}
.contact { font-family: Arial, Helvetica, sans-serif; font-size: 0.9rem; letter-spacing: 0.1em; color: #d8eef8; margin-top: 2rem; text-transform: uppercase; animation: fadein 2s ease 5s forwards; opacity: 0; }
.contact .number { font-family: Arial, Helvetica, sans-serif; font-size: 1.4rem; letter-spacing: 0.05em; color: #e8c87a; margin-top: 0.5rem; text-decoration: none; display: inline-block; font-style: normal; font-weight: normal; }
canvas{position:fixed;inset:0;z-index:4;pointer-events:none}
@media (max-width: 768px) {
  .logo { margin-bottom: 0.9rem; }
  .divider { margin-bottom: 0.9rem; }
}
</style>
</head>
<body>
<div class="ocean"></div>
<div class="surface"></div>
<div class="caustics" id="caustics"></div>
<div class="content">
  <img src="ChatGPT Image Apr 19, 2026, 11_39_55 PM.png" alt="Boat Seafood Restaurant Logo" class="logo">
  <div class="divider"></div>
  <h1 class="headline" style="font-size: clamp(2.5rem, 4.5vw, 4rem); font-style: normal;">Dear customers,<br><em>Apologies for the short break.</em></h1>
  <p class="subline" style="text-transform: none; letter-spacing: 0.1em; line-height: 1.6; font-family: 'Cormorant Garamond', Georgia, serif; font-size: clamp(1.2rem, 2.2vw, 1.5rem);">We’ll be back in a few days—same taste, new ambiance.<br><br><span style="font-style: italic; color: #e8c87a; font-size: 1.2em;">See you soon.</span></p>
  <div class="vline"></div>
  <p class="location">Dubai &nbsp;&middot;&nbsp; Waterfront Market</p>
  <div class="contact">
    <p>Connect with us</p>
    <a href="tel:+971586973383" class="number">+971 58 697 3383</a>
  </div>
</div>
<canvas id="c"></canvas>
<script>
(function(){
  // rays
  var caustics=document.getElementById("caustics");
  for(var i=0;i<22;i++){
    var ray=document.createElement("div");ray.className="ray";
    var xp=(i/22)*112-4,r=(Math.random()-0.5)*16,s=2+Math.random()*7,dur=6+Math.random()*10,del=-(Math.random()*13),op=0.15+Math.random()*0.45,w=1.5+Math.random()*4,ht=50+Math.random()*35;
    ray.style.cssText="left:"+xp+"%;width:"+w+"px;height:"+ht+"%;--r:"+r+"deg;--s:"+s+"deg;--o:"+op+";animation-duration:"+dur+"s;animation-delay:"+del+"s";
    caustics.appendChild(ray);
  }
  for(var b=0;b<38;b++){
    var bel=document.createElement("div");bel.className="bubble";
    var sz=2+Math.random()*10,bx=Math.random()*100,bdur=9+Math.random()*18,bdel=-(Math.random()*22),bdx=(Math.random()-0.5)*80;
    bel.style.cssText="left:"+bx+"vw;bottom:"+(-sz)+"px;width:"+sz+"px;height:"+sz+"px;--dx:"+bdx+"px;animation-duration:"+bdur+"s;animation-delay:"+bdel+"s";
    document.body.appendChild(bel);
  }
  for(var d=0;d<45;d++){
    var dd=document.createElement("div");dd.className="dust";
    var dsz=0.8+Math.random()*2,dx2=Math.random()*100,dy2=12+Math.random()*82,ddx=(Math.random()-0.5)*110,ddy=(Math.random()-0.5)*80,ddur=13+Math.random()*20,ddel=-(Math.random()*25);
    dd.style.cssText="left:"+dx2+"vw;top:"+dy2+"vh;width:"+dsz+"px;height:"+dsz+"px;--dx:"+ddx+"px;--dy:"+ddy+"px;animation-duration:"+ddur+"s;animation-delay:"+ddel+"s";
    document.body.appendChild(dd);
  }

  var canvas=document.getElementById("c"),ctx=canvas.getContext("2d"),W,H;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();
  window.addEventListener("resize",resize);

  /*
    KEY FIX: No body-part offsets driven by wave per-frame.
    Only the TAIL rotates with the wave. Everything else is static
    relative to the fish center — this eliminates vibration entirely.
    Fish is drawn facing RIGHT. Nose ~x=+15, tail base ~x=-15.
  */
  function drawFish(ctx, tailAngle, color, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;

    // -- BODY -- fixed ellipse, no wave offset
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.ellipse(0, 0, 15, 7, 0, 0, Math.PI * 2);
    ctx.fill();

    // -- DORSAL FIN -- fixed
    ctx.beginPath();
    ctx.moveTo(-2, -7);
    ctx.quadraticCurveTo(3, -14, 9, -7);
    ctx.closePath();
    ctx.globalAlpha = alpha * 0.6;
    ctx.fill();

    // -- PECTORAL FIN -- fixed
    ctx.save();
    ctx.translate(-1, 4);
    ctx.beginPath();
    ctx.ellipse(0, 3, 3, 6, 0.25, 0, Math.PI * 2);
    ctx.globalAlpha = alpha * 0.5;
    ctx.fill();
    ctx.restore();

    // -- TAIL -- only this part rotates with the swim wave
    ctx.save();
    ctx.translate(-15, 0);       // pivot at tail base
    ctx.rotate(tailAngle);       // smooth sine-driven rotation
    ctx.globalAlpha = alpha * 0.85;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-9, -7);
    ctx.lineTo(-10, 0);
    ctx.lineTo(-9,  7);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // -- EYE -- fixed position
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(9, -1, 2, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(8,18,32,0.88)";
    ctx.fill();
    ctx.beginPath();
    ctx.arc(8.3, -1.7, 0.7, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.65)";
    ctx.fill();

    ctx.restore();
  }

  var COLORS = [
    "rgba(130,190,218,0.42)",
    "rgba(110,175,208,0.36)",
    "rgba(155,208,228,0.40)",
    "rgba(95,165,200,0.34)",
    "rgba(165,212,232,0.38)"
  ];

  function makeFish(goRight) {
    if (goRight === undefined) goRight = Math.random() > 0.5;
    return {
      x:        goRight ? -70 : W + 70,
      y:        H * (0.07 + Math.random() * 0.86),
      goRight:  goRight,
      speed:    0.5 + Math.random() * 0.65,
      sc:       0.75 + Math.random() * 0.85,
      // tail phase advances linearly — smooth sine, no jitter
      tailPhase: Math.random() * Math.PI * 2,
      tailSpd:   0.003 + Math.random() * 0.002,  // radians per ms — slow & smooth
      // vertical drift — very slow sine
      wobPhase:  Math.random() * Math.PI * 2,
      wobSpd:    0.0006 + Math.random() * 0.0005,
      wobAmp:    8 + Math.random() * 12,          // pixels of vertical drift
      baseY:     0,                               // set after creation
      color:     COLORS[Math.floor(Math.random() * COLORS.length)],
      alpha:     0.42 + Math.random() * 0.28,
      delay:     Date.now() + Math.random() * 5500
    };
  }

  var fishes = [];
  for (var fi = 0; fi < 12; fi++) {
    var f = makeFish();
    f.baseY = f.y;
    fishes.push(f);
  }

  var lastT = 0;
  function loop(ts) {
    var dt = Math.min(ts - lastT, 50); lastT = ts;
    ctx.clearRect(0, 0, W, H);

    for (var i = 0; i < fishes.length; i++) {
      var f = fishes[i];
      if (Date.now() < f.delay) continue;

      // advance phases
      f.tailPhase += f.tailSpd * dt;
      f.wobPhase  += f.wobSpd  * dt;

      // horizontal swim
      f.x += (f.goRight ? 1 : -1) * f.speed * (dt * 0.065);

      // vertical: smooth sine around baseY
      f.y = f.baseY + Math.sin(f.wobPhase) * f.wobAmp;

      // recycle
      if (f.goRight  && f.x > W + 80) { var nf=makeFish(true);  nf.baseY=nf.y; fishes[i]=nf; continue; }
      if (!f.goRight && f.x < -80)    { var nf=makeFish(false); nf.baseY=nf.y; fishes[i]=nf; continue; }

      var tailAngle = Math.sin(f.tailPhase) * 0.38;

      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.scale(f.sc, f.sc);
      if (!f.goRight) ctx.scale(-1, 1);
      drawFish(ctx, tailAngle, f.color, f.alpha);
      ctx.restore();
    }

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
